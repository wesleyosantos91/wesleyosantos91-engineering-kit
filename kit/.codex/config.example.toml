# EXEMPLO de configuração Codex para este harness (NÃO ativo).
# Copie para .codex/config.toml manualmente se desejar — não é aplicado
# automaticamente para não sobrescrever sua configuração local.
# hooks permanecem DESATIVADOS por padrão (segurança).

model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 2400

[features]
hooks = false

[[skills.config]]
path = "./.agents/skills/java-quality-gate/SKILL.md"
enabled = true

