services:
  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: "${LOCALSTACK_IMAGE:-localstack/localstack-pro}"
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
      - "127.0.0.1:443:443"
    environment:
      LOCALSTACK_AUTH_TOKEN: "${LOCALSTACK_AUTH_TOKEN:?LOCALSTACK_AUTH_TOKEN is required}"
      DEBUG: "${DEBUG:-0}"
      PERSISTENCE: "${PERSISTENCE:-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-.localstack/volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
